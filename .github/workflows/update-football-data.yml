name: Update football-data.org data

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/update-football-data.yml"
      - "scripts/update-data.js"
      - "package.json"
  schedule:
    - cron: "7-59/10 * * * *"

permissions:
  contents: write

concurrency:
  group: update-football-data
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch football-data.org and generate static data
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          COMPETITION: WC
          SEASON: "2026"
          TIMEZONE: Asia/Ho_Chi_Minh
        run: node scripts/update-data.js

      - name: Commit data changes
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain data.json data.js)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data.json data.js
            git commit -m "chore: update World Cup data"
            git push
          else
            echo "No changes to commit."
          fi
